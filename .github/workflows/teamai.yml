name: 🤖 teamAi Code Review

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  teamai-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout кода
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 🐍 Настройка Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 📦 Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🤖 Запуск teamAi Review
        id: teamai
        env:
          FM_TOKEN: ${{ secrets.CLOUD_RU_API_KEY }}
          FM_BASE_URL: https://foundation-models.api.cloud.ru/v1
          MODEL_NAME: zai-org/GLM-4.7
        run: |
          python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          os.makedirs('teamai_output', exist_ok=True)
          
          from agents import TeamAi
          team = TeamAi()
          
          # Получаем список изменённых файлов
          changed_files = []
          if os.getenv('GITHUB_EVENT_NAME') == 'pull_request':
              import subprocess
              result = subprocess.run(['git', 'diff', '--name-only', 'HEAD^', 'HEAD'], capture_output=True, text=True)
              changed_files = [f for f in result.stdout.split('\n') if f.endswith(('.py', '.js', '.ts', '.html'))]          
          if changed_files:
              task = f'Проверь код на баги и уязвимости в файлах: {\", \".join(changed_files[:5])}'
          else:
              task = 'Проверь код проекта на баги и уязвимости'
          
          results = team.execute_smart(task)
          
          # Сохраняем результат в файл
          with open('teamai_output/review.md', 'w', encoding='utf-8') as f:
              f.write('# 🤖 teamAi Code Review\n\n')
              f.write(f'**Задача:** {task}\n\n')
              f.write(f'**Время:** {os.getenv(\"GITHUB_RUN_STARTED_AT\", \"N/A\")}\n\n')
              f.write('---\n\n')
              for agent, data in results.items():
                  content = data.get('content', '') if isinstance(data, dict) else data
                  f.write(f'## {agent}\n\n```\n{content}\n```\n\n')
          
          print('✅ Review завершён!')
          "
      
      - name: 📤 Загрузка отчёта
        uses: actions/upload-artifact@v3
        with:
          name: teamai-review-report
          path: teamai_output/
          retention-days: 30
      
      - name: 📝 Комментарий в PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let comment = '## 🤖 teamAi Code Review завершён!\n\n';
            comment += '| Статус | Значение |\n|--------|----------|\n';
            comment += '| 🔍 Проверка | ✅ Выполнена |\n';
            comment += '| 🧠 Модель | GLM-4.7 |\n';
            comment += '| 📡 Провайдер | cloud.ru |\n\n';
            comment += '📄 **Полный отчёт** доступен во вкладке "Artifacts" (скачай teamai-review-report)\n\n';
            comment += '---\n*Это сообщение создано автоматически teamAi*';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      - name: ⚠️ Уведомление о проблемах
        if: failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **teamAi Review не удался!**\n\nПроверь логи workflow и убедись, что API ключ настроен правильно.'
            });
