<!DOCTYPE html>
<html>
<head>
    <title>TeamAi WebUI</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; }
        .agent-card { border-left: 4px solid #00d4ff; background: #1e1e1e; margin: 10px 0; padding: 15px; }
        input { width: 80%; padding: 10px; background: #333; color: white; border: none; }
        button { padding: 10px 20px; background: #00d4ff; border: none; cursor: pointer; }
        .ops { color: #00ff88; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>🤖 TeamAi Terminal</h1>
    <div id="chat"></div>
    <input type="text" id="task" placeholder="Введите задачу для команды...">
    <button onclick="runTask()">Пуск</button>

    <script>
        async function runTask() {
            const task = document.getElementById('task').value;
            const res = await fetch('/api/run', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({task})
            });
            const data = await res.json();
            const chat = document.getElementById('chat');
            chat.innerHTML = data.history.map(h => `
                <div class="agent-card">
                    <h3>${h.emoji} ${h.agent}</h3>
                    <pre>${h.content}</pre>
                    <div class="ops">${h.ops.join('<br>')}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
